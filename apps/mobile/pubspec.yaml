name: kiyat_mobile
description: Iraqi public transit information app for Baghdad.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.7.0
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  geolocator: ^13.0.2
  go_router: ^14.6.2
  http: ^1.6.0
  latlong2: ^0.9.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.3.4
  socket_io_client: ^3.0.2
  maplibre_gl: ^0.26.1
  google_maps_flutter: ^2.17.1
  flutter_local_notifications: ^22.0.1
  shared_utils:
    path: ../../packages/shared_utils

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
